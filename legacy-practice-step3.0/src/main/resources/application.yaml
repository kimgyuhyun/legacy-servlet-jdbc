spring:
  application:
    name: legacy-practice-step3

  datasource:
    url: "jdbc:mysql://localhost:3306/legacy_practice?serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
    username: root
    password: "1234"

  jpa:
    hibernate:
      ddl-auto: validate # DB 자동 생성/수정 안 함, 스키마 불일치만 검증
    generate-ddl: false
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.legacy.practice.step2.dto
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace